---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-topology-viewer
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-topology-viewer
  template:
    metadata:
      labels:
        app: k8s-topology-viewer
    spec:
      serviceAccountName: k8s-topology-viewer
      containers:
      - name: topology
        image: python:3.10-slim
        command:
        - /bin/bash
        - -c
        - |
          pip install fastapi uvicorn kubernetes websockets
          cd /app && python topology_backend.py
        ports:
        - containerPort: 8889
        volumeMounts:
        - name: code
          mountPath: /app
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: code
        configMap:
          name: topology-code

---
apiVersion: v1
kind: Service
metadata:
  name: k8s-topology-viewer
  namespace: default
spec:
  type: NodePort
  selector:
    app: k8s-topology-viewer
  ports:
  - port: 8889
    targetPort: 8889
    nodePort: 30889

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: topology-code
  namespace: default
data:
  topology_backend.py: |
    # Copy content from topology_backend.py
