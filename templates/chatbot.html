<!DOCTYPE html>
<html>
<head>
    <title>K8s AI Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f1419; color: #fff; height: 100vh; display: flex; flex-direction: column; }
        #header { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); padding: 15px 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); display: flex; justify-content: space-between; align-items: center; }
        #header h1 { font-size: 20px; font-weight: 600; }
        .ai-badge { background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%); padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .controls { display: flex; gap: 10px; }
        .btn-clear { background: rgba(239,68,68,0.2); border: 1px solid #ef4444; color: #fff; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.3s; }
        .btn-clear:hover { background: rgba(239,68,68,0.4); }
        .btn-export { background: rgba(16,185,129,0.2); border: 1px solid #10b981; color: #fff; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.3s; }
        .btn-export:hover { background: rgba(16,185,129,0.4); }
        #chat-container { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; gap: 15px; }
        .message { padding: 12px 16px; border-radius: 12px; max-width: 80%; word-wrap: break-word; line-height: 1.6; }
        .user-message { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); align-self: flex-end; margin-left: auto; box-shadow: 0 2px 8px rgba(59,130,246,0.3); }
        .bot-message { background: #334155; align-self: flex-start; border-left: 3px solid #8b5cf6; white-space: pre-wrap; font-size: 14px; }
        .bot-message code { background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px; font-family: 'Courier New', monospace; color: #10b981; }
        .bot-message pre { background: rgba(0,0,0,0.5); padding: 12px; border-radius: 8px; overflow-x: auto; margin: 10px 0; border-left: 3px solid #10b981; }
        .bot-message pre code { background: none; padding: 0; color: #10b981; }
        .bot-message strong { color: #fbbf24; }
        .timestamp { font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 4px; }
        .typing { background: #334155; padding: 12px 16px; border-radius: 12px; align-self: flex-start; width: 60px; }
        .typing span { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #8b5cf6; margin: 0 2px; animation: typing 1.4s infinite; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-10px); } }
        #input-area { background: #1e293b; padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .input-row { display: flex; gap: 10px; }
        #message-input { flex: 1; background: rgba(255,255,255,0.1); border: 2px solid rgba(59,130,246,0.3); padding: 12px 16px; border-radius: 8px; color: #fff; font-size: 14px; resize: vertical; min-height: 44px; max-height: 120px; }
        #message-input:focus { outline: none; border-color: #3b82f6; background: rgba(255,255,255,0.15); }
        #send-btn { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: #fff; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 500; transition: all 0.3s; }
        #send-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(59,130,246,0.5); }
        #send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .suggestions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .suggestion-btn { background: rgba(139,92,246,0.2); border: 1px solid #8b5cf6; color: #fff; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.3s; }
        .suggestion-btn:hover { background: rgba(139,92,246,0.4); transform: translateY(-2px); }
        .quick-actions { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
        .quick-action { background: rgba(16,185,129,0.2); border: 1px solid #10b981; color: #fff; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; }
        .quick-action:hover { background: rgba(16,185,129,0.4); }
    </style>
</head>
<body>
    <div id="header">
        <h1>🤖 Kubernetes AI Assistant</h1>
        <div class="controls">
            <span class="ai-badge">✨ AI Powered</span>
            <button class="btn-export" onclick="exportChat()">📥 Export</button>
            <button class="btn-clear" onclick="clearChat()">🗑️ Clear</button>
        </div>
    </div>
    <div id="chat-container"></div>
    <div id="input-area">
        <div class="quick-actions">
            <button class="quick-action" onclick="askQuestion('Analyze cluster health')">🏥 Health Check</button>
            <button class="quick-action" onclick="askQuestion('Show critical issues')">🚨 Critical Issues</button>
            <button class="quick-action" onclick="askQuestion('Check resource usage')">📊 Resources</button>
            <button class="quick-action" onclick="askQuestion('List all errors')">❌ All Errors</button>
        </div>
        <div class="input-row">
            <textarea id="message-input" placeholder="Ask me anything about your cluster..." onkeypress="if(event.key==='Enter' && !event.shiftKey) { event.preventDefault(); sendMessage(); }"></textarea>
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
        <div class="suggestions" id="suggestions"></div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        let messageHistory = [];

        function addMessage(text, isUser) {
            const msgWrapper = document.createElement('div');
            msgWrapper.style.display = 'flex';
            msgWrapper.style.flexDirection = 'column';
            msgWrapper.style.alignItems = isUser ? 'flex-end' : 'flex-start';
            msgWrapper.style.maxWidth = '80%';
            msgWrapper.style.alignSelf = isUser ? 'flex-end' : 'flex-start';
            
            const msg = document.createElement('div');
            msg.className = 'message ' + (isUser ? 'user-message' : 'bot-message');
            
            if (!isUser) {
                // Format bot messages with markdown-like syntax
                text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                text = text.replace(/```bash\n([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
                text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
                msg.innerHTML = text;
            } else {
                msg.textContent = text;
            }
            
            const timestamp = document.createElement('div');
            timestamp.className = 'timestamp';
            timestamp.textContent = new Date().toLocaleTimeString();
            
            msgWrapper.appendChild(msg);
            msgWrapper.appendChild(timestamp);
            chatContainer.appendChild(msgWrapper);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            messageHistory.push({ text, isUser, timestamp: new Date().toISOString() });
        }

        function showTyping() {
            const typing = document.createElement('div');
            typing.className = 'typing';
            typing.id = 'typing-indicator';
            typing.innerHTML = '<span></span><span></span><span></span>';
            chatContainer.appendChild(typing);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();
        }

        function addSuggestions() {
            const suggestions = document.getElementById('suggestions');
            suggestions.innerHTML = `
                <button class="suggestion-btn" onclick="askQuestion('Show me failed pods and how to fix them')">Failed Pods</button>
                <button class="suggestion-btn" onclick="askQuestion('Why are my pods pending?')">Pending Pods</button>
                <button class="suggestion-btn" onclick="askQuestion('Check deployment issues')">Deployments</button>
                <button class="suggestion-btn" onclick="askQuestion('Troubleshoot service connectivity')">Services</button>
                <button class="suggestion-btn" onclick="askQuestion('Check node health and pressure')">Nodes</button>
            `;
        }

        function askQuestion(question) {
            messageInput.value = question;
            sendMessage();
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            addMessage(text, true);
            messageInput.value = '';
            sendBtn.disabled = true;
            showTyping();

            try {
                const res = await fetch('/api/chatbot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();
                hideTyping();
                addMessage(data.response, false);
            } catch (error) {
                hideTyping();
                addMessage('❌ Error: Unable to get response. Please try again.', false);
            } finally {
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        function clearChat() {
            if (confirm('Clear chat history?')) {
                chatContainer.innerHTML = '';
                messageHistory = [];
                addMessage('Chat cleared. How can I help you?', false);
                addSuggestions();
            }
        }

        function exportChat() {
            const text = messageHistory.map(m => 
                `[${new Date(m.timestamp).toLocaleString()}] ${m.isUser ? 'You' : 'AI'}: ${m.text}`
            ).join('\n\n');
            
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `k8s-chat-${Date.now()}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // Welcome message
        addMessage('👋 Hello! I\'m your AI-powered Kubernetes troubleshooting assistant.\n\n✅ I provide:\n• Detailed cluster analysis\n• Root cause identification\n• Step-by-step solutions with kubectl commands\n• Prevention strategies\n• Verification steps\n\n💡 I remember our conversation context for better assistance!\n\nWhat would you like to investigate?', false);
        addSuggestions();
    </script>
</body>
</html>
