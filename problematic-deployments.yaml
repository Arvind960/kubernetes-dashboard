apiVersion: apps/v1
kind: Deployment
metadata:
  name: problematic-app
  labels:
    app: problematic-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: problematic-app
  template:
    metadata:
      labels:
        app: problematic-app
    spec:
      containers:
      - name: crash-container
        image: busybox:latest
        command: ["sh", "-c", "echo Starting...; sleep 5; exit 1"]
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-pull-error
  labels:
    app: image-pull-error
spec:
  replicas: 2
  selector:
    matchLabels:
      app: image-pull-error
  template:
    metadata:
      labels:
        app: image-pull-error
    spec:
      containers:
      - name: bad-image
        image: nonexistent-image:invalid-tag
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-killer
  labels:
    app: oom-killer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oom-killer
  template:
    metadata:
      labels:
        app: oom-killer
    spec:
      containers:
      - name: memory-hog
        image: polinux/stress
        command: ["stress", "--vm", "1", "--vm-bytes", "256M"]
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: problematic-service
  labels:
    app: problematic-app
spec:
  type: ClusterIP
  selector:
    app: problematic-app
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: image-error-service
  labels:
    app: image-pull-error
spec:
  type: ClusterIP
  selector:
    app: image-pull-error
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
